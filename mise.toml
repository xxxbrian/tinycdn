[tools]
go = "1.26.0"
node = "24.9.0"
pnpm = "10.25.0"

[tasks."fmt:go"]
description = "Format Go code"
run = "go fmt ./..."

[tasks."fmt:web"]
description = "Format frontend code"
run = "pnpm --dir web run fmt"

[tasks.fmt]
description = "Format Go and frontend code"
depends = ["fmt:go", "fmt:web"]

[tasks."test:go"]
description = "Run Go tests with CGO disabled"
run = "CGO_ENABLED=0 go test ./..."

[tasks."build:go"]
description = "Build Go binaries with CGO disabled"
run = "CGO_ENABLED=0 go build ./..."

[tasks."typecheck:web"]
description = "Type-check the frontend"
run = "pnpm --dir web exec tsc --noEmit"

[tasks."build:web"]
description = "Build the frontend"
run = "pnpm --dir web build"

[tasks.build]
description = "Build project artifacts"
depends = ["build:go", "build:web"]

[tasks."clean:dist"]
description = "Remove previous release artifacts"
run = "rm -rf ./dist && mkdir -p ./dist"

[tasks."release:go"]
description = "Build a distributable TinyCDN binary"
run = "sh -c 'target_os=${RELEASE_GOOS:-$(go env GOOS)}; target_arch=${RELEASE_GOARCH:-$(go env GOARCH)}; output=${RELEASE_BIN_PATH:-./dist/release/${target_os}-${target_arch}/tinycdn}; mkdir -p \"$(dirname \"$output\")\" && CGO_ENABLED=0 GOOS=\"$target_os\" GOARCH=\"$target_arch\" go build -o \"$output\" ./cmd/tinycdn'"

[tasks."release:web"]
description = "Build and stage distributable frontend assets"
run = "sh -c 'output=${RELEASE_WEB_DIR:-./dist/release/web}; pnpm --dir web build && rm -rf \"$output\" && mkdir -p \"$output\" && cp -R ./web/dist/. \"$output\"'"

[tasks.release]
description = "Create distributable release artifacts in ./dist"
run = "sh -c 'mise run clean:dist && mise run release:web && mise run release:go'"

[tasks."release:go:linux-amd64"]
description = "Build the linux/amd64 TinyCDN binary"
run = "RELEASE_GOOS=linux RELEASE_GOARCH=amd64 RELEASE_BIN_PATH=./dist/release/linux-amd64/tinycdn mise run release:go"

[tasks."release:go:linux-arm64"]
description = "Build the linux/arm64 TinyCDN binary"
run = "RELEASE_GOOS=linux RELEASE_GOARCH=arm64 RELEASE_BIN_PATH=./dist/release/linux-arm64/tinycdn mise run release:go"

[tasks."release:docker:amd64"]
description = "Build the linux/amd64 Docker image from prebuilt release artifacts"
run = "sh -c '[ -d ./dist/release/web ] || RELEASE_WEB_DIR=./dist/release/web mise run release:web; [ -f ./dist/release/linux-amd64/tinycdn ] || mise run release:go:linux-amd64; docker build --platform linux/amd64 --build-arg BINARY_PATH=dist/release/linux-amd64/tinycdn --build-arg WEB_PATH=dist/release/web -t tinycdn:linux-amd64 .'"

[tasks."release:docker:arm64"]
description = "Build the linux/arm64 Docker image from prebuilt release artifacts"
run = "sh -c '[ -d ./dist/release/web ] || RELEASE_WEB_DIR=./dist/release/web mise run release:web; [ -f ./dist/release/linux-arm64/tinycdn ] || mise run release:go:linux-arm64; docker build --platform linux/arm64 --build-arg BINARY_PATH=dist/release/linux-arm64/tinycdn --build-arg WEB_PATH=dist/release/web -t tinycdn:linux-arm64 .'"

[tasks.check]
description = "Run the core verification suite"
depends = ["test:go", "typecheck:web", "build"]

[tasks."dev:server"]
description = "Run the TinyCDN admin and proxy server"
run = "CGO_ENABLED=0 go run ./cmd/tinycdn"

[tasks."dev:web"]
description = "Run the frontend dev server"
run = "pnpm --dir web dev --host"

[tasks.dev]
description = "Run backend and frontend dev servers together"
run = "sh -c 'trap \"kill 0\" EXIT INT TERM; CGO_ENABLED=0 go run ./cmd/tinycdn & pnpm --dir web dev --host & wait'"
